version: '3.8'

services:
  arbitrage-bot:
    # 🎯 核心修正：不再从本地 build，而是直接拉取 GitHub Actions 自动帮你构建好的最新黄金镜像！
    image: ghcr.io/${GITHUB_USERNAME_LOWER}/${REPO_NAME}:main
    container_name: arbitrage-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - ARBITRUM_RPC_URL_1=${ARBITRUM_RPC_URL_1}
      - ARBITRUM_RPC_URL_2=${ARBITRUM_RPC_URL_2}
      - OPERATOR_PRIVATE_KEY=${OPERATOR_PRIVATE_KEY}
      - CONTRACT_ADDRESS=${CONTRACT_ADDRESS}
      - MIN_PROFIT_THRESHOLD=${MIN_PROFIT_THRESHOLD:-0.0001}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-1.2}